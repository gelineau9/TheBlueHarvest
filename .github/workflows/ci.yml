name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck-and-build:
    name: Type Check & Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type check (all packages)
        run: npm run check-types

      - name: Build backend
        run: npm run build --workspace=apps/backend

      - name: Build frontend
        run: npm run build --workspace=apps/frontend
        env:
          # Provide a placeholder so next.config.ts image pattern logic doesn't error
          NEXT_PUBLIC_BACKEND_HOSTNAME: ci-placeholder

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blueharvest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: blueharvest_test
      JWT_SECRET: ci-test-secret-that-is-at-least-32-chars
      ALLOWED_ORIGINS: http://localhost:3000
      BACKEND_URL: http://localhost:4000
      PORT: 4000
      NODE_ENV: test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write test env file
        run: |
          cat <<EOF > apps/backend/.env.test
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          DB_HOST=${DB_HOST}
          DB_PORT=${DB_PORT}
          DB_NAME=${DB_NAME}
          DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
          JWT_SECRET=${JWT_SECRET}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
          BACKEND_URL=${BACKEND_URL}
          PORT=${PORT}
          NODE_ENV=${NODE_ENV}
          EOF

      - name: Run backend tests with coverage
        run: npx vitest run --coverage
        working-directory: apps/backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          retention-days: 7

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests with coverage
        run: npx vitest run --coverage
        working-directory: apps/frontend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: apps/frontend/coverage/
          retention-days: 7
